function setIframeHeight(iframeid)
{	
    try{
		var iframe = document.getElementById(iframeid);
		
        if(iframe.attachEvent)
		{		
			try{
				var doc = iframe.contentDocument || iframe.document;
				var newheigth = iframe.contentWindow.document.documentElement.scrollHeight;
				var Bodyheigth = document.body.clientHeight; 
			}catch(e){
			var newheigth = 370;
			return;
			}
			
			newheigth = newheigth > 370 ? newheigth : 370;
			newheigth = Bodyheigth < 370 ? 370 : newheigth;
			
            iframe.attachEvent("onload", function(){
                iframe.height =  newheigth;
				return;
            });

			
			iframe.height =  newheigth;
            return;
        }
		else
		{
			try{
				var newheigth = iframe.contentDocument.body.scrollHeight;
				var doc = iframe.contentDocument || iframe.document;
				var Bodyheigth = document.body.clientHeight; 
				newheigth = newheigth > 370 ? newheigth : 370;
				newheigth = Bodyheigth < 370 ? 370 : newheigth;
			}catch(e){
				return ;
			}
			
            iframe.onload = function(){
                iframe.height = newheigth;
				return;
            };
			
			iframe.height = newheigth;
            return;    
        }     
    }catch(e){
		return;
    }
}

function onSecondMenuChange(id)
{
    if (!ifCanChangeMenu()) {
        return;
    } else {
		if (top.ajaxInfo) {
			top.ajaxInfo.abort()
		}
	}

    var newId = id;
    if (['FIDNADESKAP', 'FIDNADESKAP2'].indexOf(curCfgMode) >= 0) {
      var idInfo = newId.split("_");
      if (idInfo[0] == "parentalcontrol") {
        newId = idInfo[0];
        MenuList[newId].url = "html/bbsp/parentalctrl/parentalctrlstatus.asp?" + idInfo[1];
      }
    }

    top.pingTestFlag = 0;
    top.tracerouteTestFlag = 0;

function onFirstMenuChange(id)
{

    top.pingTestFlag = 0;

	$("#functioncontent").css("height", "100%");
	for(var IndexID in MenuList)
	{
		$("#" + IndexID).removeClass("secondActive");
	}
	
	for(var IndexID in FirstMenuIDList)
	{
		if (id == IndexID)
		{
			$("#" + id).addClass("active");
			
			if (FirstMenuIDList[IndexID].hasChild == true)
			{
				document.getElementById(FirstMenuIDList[IndexID].id).style.display="block";
				$("#" + FirstMenuIDList[IndexID].secondid).addClass("secondActive");
				$("#icon_" + IndexID).removeClass("icon");
				$("#icon_" + IndexID).addClass("iconactive");	
			}
			
			$("#functioncontent").attr("src", FirstMenuIDList[IndexID].secondurl);
			continue;
		}
		
		if (FirstMenuIDList[IndexID].hasChild == true)
		{
			document.getElementById(FirstMenuIDList[IndexID].id).style.display="none";
			$("#icon_" + IndexID).removeClass("iconactive");
			$("#icon_" + IndexID).addClass("icon");
		}
		
		$("#" + IndexID).removeClass("active");
	}
}

function getMenuStrDefLen(level)
{
	var length = 0;

	if (curLanguage.toUpperCase() == "CHINESE")
	{
		length = 8;
	}
	else
	{
		if (level == "first" )
		{
			length = 22;
		}
		else
		{
			length = 18;
		}
	}

	return length;
}

function GetMenuStr(datastr, level)
{
	var length = getMenuStrDefLen(level);
	var MenuName = GetStringContentForTitle(datastr, length);
	return MenuName;
}

function GetMenuTitle(datastr, level, element)
{
	var length = getMenuStrDefLen(level);
	var titlestr = "";
	if (datastr.length > length)
	{
		titlestr = ' title="' + datastr + '" ';
		if (element != null)
			element.setAttribute("title", datastr);
	}
	return titlestr;
}

function GetIdByUrl(Type, BaseUrl)
{	
	var NewId = Type+"_";
	var MarkEnd="";
	try{
		var lastindex = BaseUrl.lastIndexOf('/');
		if( lastindex > -1 )
		{
			NewId += BaseUrl.substring(lastindex+1, BaseUrl.length);
		}
		else
		{
			NewId += BaseUrl;
		}
		
		if(NewId.indexOf("?") > -1)
		{
			MarkEnd = NewId.split("?")[1];
		}
		
		NewId = NewId.split(".")[0]+MarkEnd;
		
	}catch(e){
		NewId += Math.round(Math.random() * 10000);
	}
	return NewId;
}
